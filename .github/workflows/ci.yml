name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore TavernIdler.sln

      - name: Build
        run: dotnet build TavernIdler.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test TavernIdler.sln --configuration Release --no-build --verbosity normal
